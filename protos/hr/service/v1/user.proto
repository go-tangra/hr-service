syntax = "proto3";

package hr.service.v1;

import "google/api/annotations.proto";

// Lightweight user representation for HR module dropdowns
message HrUser {
  uint32 id = 1 [json_name = "id"];
  string username = 2 [json_name = "username"];
  string realname = 3 [json_name = "realname"];
  string email = 4 [json_name = "email"];
  repeated string org_unit_names = 5 [json_name = "orgUnitNames"];
  repeated string position_names = 6 [json_name = "positionNames"];
}

message ListHrUsersRequest {
  optional bool no_paging = 1 [json_name = "noPaging"];
}

message ListHrUsersResponse {
  repeated HrUser items = 1 [json_name = "items"];
  int32 total = 2 [json_name = "total"];
}

// HrUserService provides user listing for HR module
service HrUserService {
  rpc ListUsers(ListHrUsersRequest) returns (ListHrUsersResponse) {
    option (google.api.http) = {
      get: "/v1/users"
    };
  }
}
