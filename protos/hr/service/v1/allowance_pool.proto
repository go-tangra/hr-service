syntax = "proto3";

package hr.service.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";

// AllowancePool groups multiple absence types to share a single leave allowance budget
message AllowancePool {
  optional string id = 1 [json_name = "id"];
  optional uint32 tenant_id = 2 [json_name = "tenantId"];
  optional string name = 3 [json_name = "name"];
  optional string description = 4 [json_name = "description"];
  optional string color = 5 [json_name = "color"];
  optional string icon = 6 [json_name = "icon"];

  // IDs of absence types that belong to this pool (read-only, populated on get/list)
  repeated string absence_type_ids = 10 [json_name = "absenceTypeIds"];

  optional google.protobuf.Timestamp created_at = 20 [json_name = "createdAt"];
  optional google.protobuf.Timestamp updated_at = 21 [json_name = "updatedAt"];
  optional uint32 created_by = 22 [json_name = "createdBy"];
  optional uint32 updated_by = 23 [json_name = "updatedBy"];
}

message CreateAllowancePoolRequest {
  optional string name = 1 [
    json_name = "name",
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 255,
    (google.api.field_behavior) = REQUIRED
  ];

  optional string description = 2 [json_name = "description"];
  optional string color = 3 [json_name = "color"];
  optional string icon = 4 [json_name = "icon"];

  // Absence type IDs to add to this pool
  repeated string absence_type_ids = 5 [json_name = "absenceTypeIds"];
}

message CreateAllowancePoolResponse {
  AllowancePool pool = 1 [json_name = "pool"];
}

message GetAllowancePoolRequest {
  string id = 1 [
    json_name = "id",
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];
}

message GetAllowancePoolResponse {
  AllowancePool pool = 1 [json_name = "pool"];
}

message ListAllowancePoolsRequest {
  optional int32 page = 1 [json_name = "page"];
  optional int32 page_size = 2 [json_name = "pageSize"];
  optional bool no_paging = 3 [json_name = "noPaging"];
  optional string query = 4 [json_name = "query"];
}

message ListAllowancePoolsResponse {
  repeated AllowancePool items = 1 [json_name = "items"];
  optional int32 total = 2 [json_name = "total"];
}

message UpdateAllowancePoolRequest {
  string id = 1 [
    json_name = "id",
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];

  optional AllowancePool data = 2 [json_name = "data"];
  google.protobuf.FieldMask update_mask = 3 [json_name = "updateMask"];
}

message UpdateAllowancePoolResponse {
  AllowancePool pool = 1 [json_name = "pool"];
}

message DeleteAllowancePoolRequest {
  string id = 1 [
    json_name = "id",
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];
}

// HrAllowancePoolService manages allowance pools
service HrAllowancePoolService {
  rpc CreateAllowancePool(CreateAllowancePoolRequest) returns (CreateAllowancePoolResponse) {
    option (google.api.http) = {
      post: "/v1/allowance-pools"
      body: "*"
    };
  }

  rpc GetAllowancePool(GetAllowancePoolRequest) returns (GetAllowancePoolResponse) {
    option (google.api.http) = {
      get: "/v1/allowance-pools/{id}"
    };
  }

  rpc ListAllowancePools(ListAllowancePoolsRequest) returns (ListAllowancePoolsResponse) {
    option (google.api.http) = {
      get: "/v1/allowance-pools"
    };
  }

  rpc UpdateAllowancePool(UpdateAllowancePoolRequest) returns (UpdateAllowancePoolResponse) {
    option (google.api.http) = {
      put: "/v1/allowance-pools/{id}"
      body: "*"
    };
  }

  rpc DeleteAllowancePool(DeleteAllowancePoolRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/allowance-pools/{id}"
    };
  }
}
